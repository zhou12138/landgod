<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LandGod 个人设备工具桥架构图</title>
  <style>
    :root {
      --text: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --blue: #0284c7;
      --blue-soft: #e0f2fe;
      --green: #16a34a;
      --green-soft: #dcfce7;
      --purple: #7c3aed;
      --purple-soft: #ede9fe;
      --amber: #d97706;
      --amber-soft: #fef3c7;
      --red: #dc2626;
      --red-soft: #fee2e2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f8fafc;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    main {
      width: 1220px;
      margin: 0 auto;
      padding: 28px 28px 80px;
      background: #ffffff;
    }
    figure {
      margin: 0;
      padding: 28px 28px 52px;
      border: 1px solid #e2e8f0;
      border-radius: 28px;
      background:
        radial-gradient(circle at 12% 8%, rgba(14,165,233,.12), transparent 28%),
        radial-gradient(circle at 88% 10%, rgba(34,197,94,.10), transparent 30%),
        #ffffff;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: -0.04em;
      line-height: 1.12;
    }
    .subtitle {
      margin: 10px 0 24px;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.45;
    }
    svg { width: 100%; height: 720px; display: block; }
    .title { font-size: 24px; font-weight: 850; fill: var(--text); text-anchor: middle; }
    .sub { font-size: 15px; font-weight: 520; fill: var(--muted); text-anchor: middle; }
    .cap { font-size: 16px; font-weight: 760; fill: var(--text); text-anchor: middle; }
    .label { font-size: 15px; font-weight: 700; fill: var(--muted); text-anchor: middle; }
    figcaption {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }
    .note {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 14px 16px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }
    .note strong { display: block; color: var(--text); margin-bottom: 4px; }
  </style>
</head>
<body>
  <main>
    <figure>
      <h1>LandGod：云上 Agent 到个人设备工具环境的安全桥</h1>
      <p class="subtitle">把用户自己的电脑变成云上 Agent 的本地工具运行时：Agent 在云上思考，LandGod 路由和授权，本地 Worker 调用已配置好的 CLI、文件、浏览器和工作环境。</p>
      <svg viewBox="0 0 1120 720" role="img" aria-label="LandGod 个人设备工具桥架构图">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L8,3 z" fill="#64748b" />
          </marker>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
          </filter>
        </defs>

        <!-- arrows -->
        <path d="M560 90 L560 145" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
        <path d="M560 245 L560 302" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
        <path d="M560 420 C250 420 180 455 180 510" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
        <path d="M560 420 C430 440 390 470 390 510" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
        <path d="M560 420 C560 450 560 470 560 510" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
        <path d="M560 420 C725 440 755 470 755 510" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
        <path d="M560 420 C875 420 940 455 940 510" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />

        <!-- cloud agent -->
        <rect x="210" y="18" width="700" height="74" rx="22" fill="var(--blue-soft)" stroke="#7dd3fc" stroke-width="2" filter="url(#shadow)" />
        <text x="560" y="50" class="title">云上 Agent</text>
        <text x="560" y="76" class="sub">Societas · Claude · Cursor · Codex · OpenClaw · 任意云上 Agent</text>

        <!-- bridge -->
        <rect x="180" y="148" width="760" height="100" rx="26" fill="var(--purple-soft)" stroke="#c4b5fd" stroke-width="2" filter="url(#shadow)" />
        <text x="560" y="186" class="title">LandGod Bridge</text>
        <text x="560" y="214" class="sub">设备路由 · 用户授权 · 能力开关 · Activity History · 可随时撤销</text>
        <text x="560" y="236" class="sub">不是把凭据搬到云上，而是把任务送到正确的本地设备执行</text>

        <!-- devices -->
        <rect x="120" y="304" width="880" height="120" rx="28" fill="var(--green-soft)" stroke="#86efac" stroke-width="2" filter="url(#shadow)" />
        <text x="560" y="344" class="title">用户可信设备上的 Worker</text>
        <text x="560" y="374" class="sub">家里 Mac · 公司 Windows · Linux Dev Box · 带 VPN 的工作笔记本 · 已登录 Portal 的办公机</text>
        <text x="560" y="402" class="sub">本地凭据、证书、浏览器登录态、CLI 配置和文件都留在用户设备上</text>

        <!-- tools -->
        <g>
          <rect x="55" y="510" width="250" height="86" rx="20" fill="var(--amber-soft)" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)" />
          <text x="180" y="542" class="cap">本地 CLI 工具</text>
          <text x="180" y="568" class="sub">workiq · az · gh · copilot</text>
          <text x="180" y="590" class="sub">kubectl · ssh · 内部脚本</text>
        </g>
        <g>
          <rect x="325" y="510" width="130" height="86" rx="20" fill="var(--amber-soft)" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)" />
          <text x="390" y="542" class="cap">本地文件</text>
          <text x="390" y="568" class="sub">PDF · Excel</text>
          <text x="390" y="590" class="sub">下载 · repo</text>
        </g>
        <g>
          <rect x="480" y="510" width="160" height="86" rx="20" fill="var(--amber-soft)" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)" />
          <text x="560" y="542" class="cap">浏览器登录态</text>
          <text x="560" y="568" class="sub">Portal · OA</text>
          <text x="560" y="590" class="sub">Dashboard</text>
        </g>
        <g>
          <rect x="675" y="510" width="160" height="86" rx="20" fill="var(--amber-soft)" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)" />
          <text x="755" y="542" class="cap">内网环境</text>
          <text x="755" y="568" class="sub">VPN · 证书</text>
          <text x="755" y="590" class="sub">私有网络</text>
        </g>
        <g>
          <rect x="860" y="510" width="160" height="86" rx="20" fill="var(--amber-soft)" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)" />
          <text x="940" y="542" class="cap">本地应用</text>
          <text x="940" y="568" class="sub">桌面软件</text>
          <text x="940" y="590" class="sub">专用客户端</text>
        </g>

        <!-- safety strip -->
        <rect x="160" y="642" width="800" height="54" rx="18" fill="var(--red-soft)" stroke="#fecaca" stroke-width="2" />
        <text x="560" y="664" class="label">核心承诺：凭据留在本地 · 用户授权执行 · 能力可开关 · 操作可见可撤销</text>
        <text x="560" y="687" class="sub">Cloud intelligence. Local tools. Credentials stay on your device.</text>
      </svg>
      <figcaption>
        <div class="note"><strong>云上 Agent 是大脑</strong>负责理解目标、规划步骤、总结结果。</div>
        <div class="note"><strong>LandGod 是桥</strong>负责把任务路由到正确设备，并执行用户授权边界。</div>
        <div class="note"><strong>个人设备是手和工具箱</strong>负责调用本地 CLI、文件、浏览器、Portal 和工作环境。</div>
      </figcaption>
    </figure>
  </main>
</body>
</html>
